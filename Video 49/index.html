<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Object Fit and Object Cover</title>
    <style>
        .container {
            width: 433px ;
            height: 390px;
            border: 2px solid black;
            background-image: url("https://i.pinimg.com/236x/1a/52/0d/1a520d18a21640146b7d7db66697f706.jpg");
            background-position: center center;
            background-repeat: repeat-y;
            background-clip: border-box;
        img {
            width: 433px;
            height: 390px;
            object-position: 40px 20px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="container">
       
    </div>
</body>
</html>
