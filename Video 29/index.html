<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        
        body {
            background-color: gray;
        }

        .card {
            background-color: white;
            height: 394px;
            width: 294px;
            border-radius: 7px;
            align-items: center;
        }

        .image {
            padding: 5px;
        }

        .image img {
            border-radius: 5px;
        }
        .capsules span {
            border: 1px solid gray;
            border-radius: 7px;
            padding: 0 13px
        }
        .content p{
            font-size: 12px;
        }
        .button {
            text-align: center;
        }
        .button button{
            border: 1px solid gray;
            border-radius: 2px;
            background-color: blueviolet;
            padding: 3px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="image">
            <img width="274px" height="178px" src="download (29).jpeg" alt="">
        </div>
        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>
       
        <div class="content">
            <h1>Tourism Heaven</h1>
        </div>
        <p>This could be you standing there. Yes I am serious and not bluffing. Leave behind the life of boredom and
            join the adventure</p>
        <div class="button">
        Read More
            </div>
    </div>
    
</body>

</html>
