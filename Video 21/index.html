<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* The specificity of this selector is 1 */
        h1 {
            color: aqua;
        }
        /* This is an example of Attribute Selector. The specificity of this selector is 10 */
        [data-x=a] {
            background-color: maroon;
        }
        /* The specificity of this selector is 10 */
        .cpurple {
            color: purple;
        }
        /* The specificity of this selector is 10 */
        .yellow {
            color: yellow;
        }
                /* The specificity of this selector is 10 */
        .cred {
            background-color: red;
        }
        
    </style>
<body>
    <div>
        <h1  data-x="a"  class="yellow cred cpurple">CSS specification</h1>
    </div>
</body>
</html>
