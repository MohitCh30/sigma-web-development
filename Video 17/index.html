<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element Selector */
        div{
            /* background-color: red; */
        }
        .red{
            background-color: red;
        }
        /* Id Selector  */
        #green{
            background-color: green;
        }
        /* Child Selectors */
        div > p {
            color: cadetblue;
            background-color: blueviolet;
        }
        /* Descendent Selector  */
        div p {
            color: cadetblue;
            background-color: blueviolet;
        }
        /* Universal Selector */
        * {
            margin: 0;
            padding: 0;
        }
        /* Pseudo Selector */
        a:visited {
            color: chocolate;
        }
        a:active {
            background-color: brown;
        }
        p:first-child {
            background-color: rgb(251, 4, 4);
        }
    </style>
</head>
<body>
    <main class="one">
        <p>I am first</p>
        <p>I am second</p>
    </main>
    <div class="red">
        I am a Div
        <article>
        <p>
         I may look normal on the inside but the fangs inside my heart yearn for you. I tried to open up to you but alas! you left without listening to me Chaps
        </p>
    </article>
    </div>
    <div id="green">
        I am another Div
    </div>
    <a href="https://x.com/home">Go to Twitter</a>
    <a href="https://www.quora.com/">Go to Quora</a>
</body>
</html>
