<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        main {
            background-color: black;
            color: white;
            padding: 34px;
        }
        header {
            position: sticky;
            top:0;
        }
        nav {
            background-color: pink;
            height: 83px;
            
        }
        .container {
            margin: 12px 34px;
            background-color: green;
            text-align: center;
            padding: 13px 23px;
        }
        .box1 {
            background-color: palevioletred;
            height: 70vh;
            width: 40%;
            display: inline-block;
             margin: 0 12px;      
        }
        .box2{
            background-color:blue ;
            width: 40%;
            height: 70vh;
            display: inline-block;
            margin: 0 12px;
        }
        .textbox{
            padding: 34px;
            border: 2px solid white;
            margin: 10px 34vw;
            border-radius: 13px;
        } 
        .orange-box {
         height: 32px;
         width: 32px;
         bottom: 12px;
         right: 23px;
         border-radius: 60px;
         background: orange;
         position: fixed;
        }
        footer {
            height: 100px;
            background-color: bisque;
        }
    </style>
</head>
<body>
    <header>
        <nav></nav>
    </header>
    <main>
    <div class="container">
     <div class="box1"></div>
     <div class="box2"></div>
    </div>
    <div class="textbox">
        Welcome to Sigma Web Development Express
    </div>
    <div class="orange-box">

    </div>
    </main>
    <footer>

    </footer>
</body>
</html>
