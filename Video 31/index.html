<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Media Query</title>
    <style>
        body {
            background-color: aqua;
        }
        @media screen and (orientation:landscape) {
border: 2px solid purple;        }
        @media only screen and (max-width:469px) {
            body {
                background-color: rgb(235, 2, 228);
            }
        }
        .box {
            height: 344px;
            width: 344px;
            background-color: chocolate;
            margin: 3px;
            padding: 3px;
        }
    </style>
</head>
<body>
    <div>
        I am a Aqua Body Guy
    </div>
    <div class="boxes">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
</div>
</body>
</html>
